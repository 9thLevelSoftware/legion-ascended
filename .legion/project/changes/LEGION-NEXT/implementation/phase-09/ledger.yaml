decisions:
  - task: P09-T01
    decision: "MergeQueue module lives in @legion/core (not @legion/protocol) because it orchestrates protocol-level entities AND core-level dispatch/review outputs."
    reason: "Mirrors the P08-T01 and P08-T02 placement rule: protocol owns the entity schemas (TaskContract, PerTaskReviewPipelineResult, WorkerContext) and core owns the orchestrators that consume those entities. Keeping the merge queue in core preserves the protocol → core → CLI/board layering."
    decided_at: "2026-06-22T07:35:00Z"
  - task: P09-T01
    decision: "Rebase execution is injected via a `RebaseRunner` callback; core never imports git, Eve, or board persistence."
    reason: "ADR-004 (RuntimeDriver neutrality) and Phase 5 boundary scan forbid non-runtime modules in core from depending on runtime helpers. The CLI adapter wraps the actual git/Eve call so the queue stays provider-neutral."
    decided_at: "2026-06-22T07:35:00Z"
  - task: P09-T01
    decision: "Conflict detection is path-based and deterministic; it normalizes POSIX paths (handles `.`, `..`, trailing slashes) and reports `overlapping_write` or `sequential_violation` with sorted, deduped indices."
    reason: "Two entries claiming the same write path must block integration before the rebase step advances. The detector is pure: it only inspects entry contracts and an optional external `PathOwnershipMap` (so the CLI can layer in filesystem-discovered claims)."
    decided_at: "2026-06-22T07:35:00Z"
  - task: P09-T01
    decision: "Per-step outcome is one of seven values: `queued`, `rebased`, `conflict`, `rejected`, `escalated`, `integrated`, with `integrated` reserved for the whole-change aggregate."
    reason: "Per-step outcomes must distinguish 'runner wired, rebase succeeded' from 'runner wired, rebase failed' from 'runner missing' so the orchestrator can compute the whole-change outcome without re-running the sequencer."
    decided_at: "2026-06-22T07:35:00Z"
  - task: P09-T01
    decision: "Whole-change integration gate fails closed: any rejected/conflict step forces whole-change `rejected`; any escalated step forces whole-change `escalated`; any queued step forces whole-change `blocked`; otherwise `integrated`."
    reason: "Phase 8 already established that `AcceptanceDecision.outcome` is `accepted | rejected | escalated`; the merge queue preserves the same three-valued logic at the whole-change level and adds `blocked` for the 'runner not wired' state so operators can distinguish 'not yet integrated' from 'integrated'."
    decided_at: "2026-06-22T07:35:00Z"
  - task: P09-T01
    decision: "Sequencer propagates `previousOutcome` to the next step so a queued / conflict / rejected / escalated previous step does NOT trigger a spurious `entry_base_ref_mismatch`."
    reason: "When a step did not advance the head ref, the next entry's `baseRef` cannot drift from the chain's perspective. Flagging it would surface misleading conflicts during board-driven review of pending queues."
    decided_at: "2026-06-22T07:35:00Z"
  - task: P09-T01
    decision: "Merge queue snapshot carries `mergeQueueHash`; per-step hashes are `stepSha256`; whole-change decision hash is `decisionSha256`. The hash inputs are stable across replays so audit consumers can prove 'same queue ⇒ same decision'."
    reason: "Phase 8 set the precedent with `workerContextHash`, `reviewPipelineHash`, and `decisionSha256`; the merge queue extends that content-addressed audit trail to the whole-change layer."
    decided_at: "2026-06-22T07:35:00Z"
  - task: P09-T02
    decision: "Whole-change acceptance aggregator lives in @legion/board (the board adapter layer), NOT in @legion/core. Core stays provider-neutral; only the merge queue's frozen MergeQueueOrchestratorResult crosses the core → board boundary."
    reason: "Mirrors the P08-T02 placement rule: core owns the orchestrators that consume protocol entities, and the board adapter surfaces per-aggregate events to operators. Keeping the aggregator in board preserves the protocol → core → board → store-sqlite layering."
    decided_at: "2026-06-22T07:50:00Z"
  - task: P09-T02
    decision: "SQLite-backed whole-change projector lives in @legion/store-sqlite, not @legion/board. Board exposes the logical projection descriptor and pure reducer; the SQLite adapter wraps it into the standard SqliteBoardProjectionRebuilder flow."
    reason: "Package-boundary invariant (scripts/check-package-boundaries.mjs): @legion/board does NOT import @legion/store-sqlite. This mirrors how SqliteBoardProjectionRebuilder (store-sqlite) wraps BoardProjectionRebuilder (board-store)."
    decided_at: "2026-06-22T07:50:00Z"
  - task: P09-T02
    decision: "Outcome → status map is non-invertible by design: integrated → accepted, rejected → rejected, escalated → blocked, blocked → blocked. A blocked whole-change may later resolve to accepted via a follow-up event with a different mergeQueueHash, never by mutating a frozen state."
    reason: "Mirrors the Phase 9 HANDOFF invariant: protocol 'accepted' is terminal at the state layer, so the aggregator only emits a terminal transition through a new event keyed on a new (changeId, mergeQueueHash) pair. The original frozen state is preserved for audit."
    decided_at: "2026-06-22T07:50:00Z"
  - task: P09-T02
    decision: "Extended @legion/board-store's BOARD_EVENT_TYPES and BOARD_EVENT_AGGREGATE_KINDS allowlists with the change.* event types and the whole_change aggregate kind. These are board-layer extensions documented in the whole-change contract module."
    reason: "The board-store allowlists are the source of truth for what the SQLite repository will persist. Extending them at the board layer (rather than inventing a parallel audit table) keeps the event-log replay flow consistent with the existing task/approval/link surfaces."
    decided_at: "2026-06-22T07:50:00Z"
