decisions:
  - task: P13-T01
    decision: "Phase 0 PowerShell capture/grade/redact scaffolds were ported to Node (scripts/baseline/*.mjs) rather than requiring PowerShell on macOS."
    reason: "The Phase 0 .ps1 scripts were dependency-free PowerShell; porting to Node keeps the same behavior (lowercase SHA-256 digests over LF-normalized UTF-8 text with POSIX-relative paths, secret canary redaction) while letting the Phase 13 CLI subcommand invoke the helpers from the same runtime."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "Eval execution lives under scripts/baseline/ and the @legion/cli evals subcommand; @legion/core and @legion/board remain provider-neutral and deterministic."
    reason: "The Phase 13 task description requires release-grade workflow evals; keeping the eval harness out of @legion/core and @legion/board preserves the deterministic, host-agnostic invariants those packages already satisfy."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "v8 evidence is fail-closed: missing v8 manifests surface as null cells in ab-comparison.{json,md} rather than being invented."
    reason: "P00-T06 v8 baseline execution remains blocked; the Phase 13 contract requires that absent, stale, or drifted evidence does not pass as green."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "Token and cost are recorded as { status: 'unavailable', value: null, reason: 'host did not expose telemetry' } unless the host surfaces them; the compare aggregator never estimates values from transcript length."
    reason: "Phase 0 SCORING-RUBRIC.md explicitly forbids backfilling telemetry; the v9 eval pipeline enforces that policy by writing only host-supplied telemetry values."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "Held-out evaluator assertions and judged dimensions are intentionally not_scored_by_scaffold / judge_not_run; deterministic_total caps at 95 to leave headroom for a downstream judge."
    reason: "Captured run-manifests do not contain the held-out oracle outputs, so the deterministic seal cannot score acceptance_behavior for dry-runs; downstream graders can seal the judged dimensions after the deterministic seal passes."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T02
    decision: "The threat-model validator composes sandbox-guard + retention-audit as subprocesses plus an in-process redaction scan; the JSON verdict aggregates findings from all three sources."
    reason: "Each helper script owns a single fail-closed check with stable finding codes so CI gates can surface the right diagnostic without parsing free-form text. Subprocess composition means each helper can be invoked standalone for diagnostic or regression work, and the threat-model orchestrator stays a thin aggregator."
    decided_at: "2026-06-22T16:00:00Z"
  - task: P13-T02
    decision: "capture-run.mjs auto-grades every sealed run so score.json is on disk before the threat-model validator inspects the run directory."
    reason: "The retention policy requires score.json as a retained artifact; making the operator call `legion next evals grade` separately weakens the fail-closed contract because a missing score.json would not surface until the threat-model run. Auto-grading keeps the round-trip hermetic."
    decided_at: "2026-06-22T16:00:00Z"
  - task: P13-T02
    decision: "Redaction extended with six new detectors (URL credentials, JWT tokens, PEM-encoded private keys, multiline bearer tokens, JSON-embedded secrets, audited per-detector counts) but the held-out contract `redaction does not hide command failures` is preserved by always keeping the surrounding context."
    reason: "The P13-T01 redaction pipeline only covered a small subset of common credential shapes. Adding the missing detectors closes the gap without weakening the held-out contract: every placeholder still leaves the surrounding line visible so failure root-cause stays inspectable."
    decided_at: "2026-06-22T16:00:00Z"
  - task: P13-T02
    decision: "threat-model.mjs, sandbox-guard.mjs, and retention-audit.mjs all accept a --repository-root argument so the operator's repo root (different from the v9 source tree in CLI e2e workspaces) is honoured when resolving fixture-hash paths."
    reason: "The P13-T01 fixtures are captured against the operator's --repository-root, which is not always the v9 source tree (CLI e2e workspaces use a tmp dir). Without the override, retention-audit cannot resolve the recorded fixture paths and fails closed on every e2e capture."
    decided_at: "2026-06-22T16:00:00Z"
  - task: P13-T03
    decision: "GA gating lives in scripts/release/ + the @legion/cli release subcommand; @legion/core and @legion/board remain provider-neutral."
    reason: "The release checklist and rollback verifier are operator-facing governance gates, not core workflow logic. Keeping them out of @legion/core and @legion/board preserves the deterministic, host-agnostic invariants those packages already satisfy."
    decided_at: "2026-06-22T17:00:00Z"
  - task: P13-T03
    decision: "The release checklist and rollback-policy verifier emit stable finding codes (changelog_missing_ga_entry, manifest_backup_hash_match, etc.) so CI gates and operator dashboards can grep without parsing free-form text."
    reason: "Phase 12 established the finding-code convention for the migration verify alias and P13-T02 reused it for the threat-model verdict. P13-T03 extends the same convention to the GA cut-over so all three fail-closed gates share a single diagnostic surface."
    decided_at: "2026-06-22T17:00:00Z"
  - task: P13-T03
    decision: "The GA decision package pins four companion documents (MIGRATION-POLICY, ROLLBACK-POLICY, V8-HANDOFF, STABLE-CHANNEL-APPROVAL) and links them from the consolidated RELEASE-RECORD.md so reviewers find every artefact from a single entry point."
    reason: "The REWRITE-CHARTER rule for GA promotion requires the decision owner to approve the release record, migration policy, rollback policy, and v8 handoff. Cross-linking them in the release record prevents drift between the consolidated record and the underlying artefacts."
    decided_at: "2026-06-22T17:00:00Z"
  - task: P13-T03
    decision: "v8 evidence remains fail-closed (null cells in the A/B comparison) and the GA promotion is approved without v8 baseline execution because P00-T06 v8 baseline remains blocked."
    reason: "The Phase 13 fail-closed contract specifies that absent, stale, or drifted evidence must not pass as green. The GA approval documents the absent v8 evidence in the outstanding-items list of RELEASE-RECORD.md so the decision owner signs the GA promotion with full visibility."
    decided_at: "2026-06-22T17:00:00Z"
