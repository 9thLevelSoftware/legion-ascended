decisions:
  - task: P13-T01
    decision: "Phase 0 PowerShell capture/grade/redact scaffolds were ported to Node (scripts/baseline/*.mjs) rather than requiring PowerShell on macOS."
    reason: "The Phase 0 .ps1 scripts were dependency-free PowerShell; porting to Node keeps the same behavior (lowercase SHA-256 digests over LF-normalized UTF-8 text with POSIX-relative paths, secret canary redaction) while letting the Phase 13 CLI subcommand invoke the helpers from the same runtime."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "Eval execution lives under scripts/baseline/ and the @legion/cli evals subcommand; @legion/core and @legion/board remain provider-neutral and deterministic."
    reason: "The Phase 13 task description requires release-grade workflow evals; keeping the eval harness out of @legion/core and @legion/board preserves the deterministic, host-agnostic invariants those packages already satisfy."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "v8 evidence is fail-closed: missing v8 manifests surface as null cells in ab-comparison.{json,md} rather than being invented."
    reason: "P00-T06 v8 baseline execution remains blocked; the Phase 13 contract requires that absent, stale, or drifted evidence does not pass as green."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "Token and cost are recorded as { status: 'unavailable', value: null, reason: 'host did not expose telemetry' } unless the host surfaces them; the compare aggregator never estimates values from transcript length."
    reason: "Phase 0 SCORING-RUBRIC.md explicitly forbids backfilling telemetry; the v9 eval pipeline enforces that policy by writing only host-supplied telemetry values."
    decided_at: "2026-06-22T15:14:00Z"
  - task: P13-T01
    decision: "Held-out evaluator assertions and judged dimensions are intentionally not_scored_by_scaffold / judge_not_run; deterministic_total caps at 95 to leave headroom for a downstream judge."
    reason: "Captured run-manifests do not contain the held-out oracle outputs, so the deterministic seal cannot score acceptance_behavior for dry-runs; downstream graders can seal the judged dimensions after the deterministic seal passes."
    decided_at: "2026-06-22T15:14:00Z"
