decisions:
  - task: P08-T01
    decision: "Fresh-context dispatcher lives in @legion/core (not @legion/protocol) because WorkerContext is a core-internal execution concept that derives from the protocol-level TaskContract."
    reason: "Phase 7 established TaskContract as the protocol-level planning boundary. WorkerContext is the dispatcher-level execution surface that consumes a preflighted TaskContract and produces an isolated worker input. Keeping it in core preserves the protocol → core boundary from Phase 5 (ADR-004)."
    decided_at: "2026-06-22T05:33:00Z"
  - task: P08-T01
    decision: "WorkerContext is deep-frozen (Object.freeze recursively) and exposes only the WORKER_CONTEXT_KEYS allowlist."
    reason: "Phase 7 closeout required 'no cross-task memory bleed'. A deep-freeze on every dispatch prevents accidental mutation of the contract boundary and lets assertIsolatedWorkerContext verify isolation invariants on every consumed context."
    decided_at: "2026-06-22T05:33:00Z"
  - task: P08-T01
    decision: "WorkerContext carries a content-addressed workerContextHash and an audit-friendly isolationTag (`fresh-context:v1:<prefix>`)."
    reason: "workerContextHash is the proof-by-grep that two contexts share the same contract boundary; isolationTag is the readable surface operators grep for in logs. Together they give Phase 8 T02 reviewers and Phase 9 evidence indexers a stable handle without leaking contract content."
    decided_at: "2026-06-22T05:33:00Z"
  - task: P08-T01
    decision: "Dispatcher source never imports runtime drivers, the board persistence package, or reads process.env."
    reason: "Phase 5 RuntimeDriver neutrality is preserved by construction: the dispatcher is a pure function from preflighted TaskContract to WorkerContext. Provider-specific execution stays outside core."
    decided_at: "2026-06-22T05:33:00Z"
  - task: P08-T01
    decision: "Structured preflight issues are mapped to board blockers with code + path encoded in the reason string."
    reason: "Board persistence does not yet have a separate code column; encoding the code and path in the reason keeps structured diagnostics recoverable from the rendered blocker without changing the BoardTaskBlocker schema. P08-T02 review loop will parse these codes."
    decided_at: "2026-06-22T05:33:00Z"
  - task: P08-T01
    decision: "Dispatcher adds a context_reference_out_of_scope issue code (separate from P07-T02 preflight codes) for specRefs/designRefs that are not in the ready artifact set."
    reason: "P07-T02 preflight only checks predecessorArtifacts. specRefs and designRefs must also be resolvable for the worker to read them; the dispatcher enforces this with its own structured code so operators can distinguish 'dependency missing' from 'context reference missing'."
    decided_at: "2026-06-22T05:33:00Z"
  - task: P08-T02
    decision: "Per-task review pipeline lives in @legion/core (not @legion/protocol) because the pipeline orchestrates protocol-level contracts AND core-level dispatcher outputs (WorkerContext)."
    reason: "Mirrors the P08-T01 placement rule: dispatch = core-internal, WorkerContext = core-internal execution surface; review consumes both and produces an AcceptanceDecision that lives next to its inputs."
    decided_at: "2026-06-22T05:48:00Z"
  - task: P08-T02
    decision: "Reviewer surface enforces hard independence: same-actor reviews are flagged `independent: false` on the ReviewRecord and surface a `reviewer_is_implementer` issue."
    reason: "ADR-006 mandates independent review at R1+. A worker cannot review its own work. The pipeline records the attempted review so audit consumers can see the rejection without losing context."
    decided_at: "2026-06-22T05:48:00Z"
  - task: P08-T02
    decision: "Per-task loop emits `escalated` (not `rejected`) for R3 because R3 requires explicit human approval which is out of scope for the loop."
    reason: "The orchestrator uses `escalated` to route R3 tasks to a human owner; the per-task loop records the gate as `not_evaluable` so the operator can see why."
    decided_at: "2026-06-22T05:48:00Z"
  - task: P08-T02
    decision: "Deterministic verification runner is injected; the pipeline never spawns a child process."
    reason: "Provider neutrality (ADR-004): the CLI adapter and runtime driver supply the actual command execution; core owns the deterministic record shape."
    decided_at: "2026-06-22T05:48:00Z"
  - task: P08-T02
    decision: "Acceptance decision outcome is one of three values: `accepted`, `rejected`, `escalated`."
    reason: "Three-valued outcome preserves the difference between 'gate failed ⇒ task must redo' and 'gate requires human ⇒ task must escalate' without conflating them."
    decided_at: "2026-06-22T05:48:00Z"
