decisions:
  - task: P05-T01
    decision: "The RuntimeDriver contract is a TypeScript interface in packages/core/src/runtime/contract.ts that declares the seven ADR-004 lifecycle methods (start, resume, cancel, inspect, stream, approve, artifact) and references only @legion/protocol types"
    reason: "ADR-004 mandates a provider-neutral contract; the core domain types, protocol entities, board records, policy records, task contracts, approvals, evidence indexes, and worker bundle manifests must not import Eve types or rely on private Eve internals. A typed TypeScript interface gives every consumer (state machines, board logic, future Eve adapter, future legacy-cli adapter) a single compile-time contract."
    decided_at: "2026-06-21T22:05:00-04:00"
  - task: P05-T01
    decision: "runtime-local is implemented as a deterministic in-memory driver that allocates run ids from the request idempotency key, freezes the manifest hash on start, advances the checkpoint generation on resume, and emits protocol events for every state transition"
    reason: "Deterministic local execution is the P05-T01 acceptance criterion. The local driver must produce Legion-protocol-compliant events so the rest of the core (state machines, event store, evidence indexing) can consume them unchanged; producing real EventEnvelope shapes (run.created.v1, run.started.v1, run.finished.v1, approval.requested.v1, approval.granted.v1, evidence.collected.v1) means downstream tests do not need an event-envelope mocker."
    decided_at: "2026-06-21T22:05:30-04:00"
  - task: P05-T01
    decision: "A dedicated runtime-import-boundary scan (scripts/scan-runtime-import-boundaries.mjs) blocks Eve, host CLIs, sqlite, non-@legion/protocol workspace imports, deep workspace imports, and legacy prompt asset imports inside packages/core/src/runtime/, and blocks core source OUTSIDE runtime/ from depending on the driver until Phase 5 wires the board to it"
    reason: "ADR-004 says the contract must import no Eve or host CLI implementation types; check-package-boundaries.mjs already blocks sqlite/provider imports for @legion/core, but does not cover host CLI entry points, runtime encapsulation, or focused Eve-regression messaging. A dedicated scan wired into validate-next gives a single-line failure when a future PR pulls an Eve type or host-CLI entry point into the core runtime."
    decided_at: "2026-06-21T22:06:00-04:00"
  - task: P05-T01
    decision: "Closeout review tightened the runtime-local final-output path so non-terminal artifact(handle) failures carry a current-state snapshot and terminal bundles preserve the terminal finishedAt timestamp."
    reason: "The extended artifact(handle) mode added after the original RuntimeDriver contract must behave the same way in the canonical runtime-local driver as it does in the FakeRuntimeDriver end-to-end tests. Preserving terminal finishedAt also keeps artifact resolution time separate from run completion time for downstream evidence indexing."
    decided_at: "2026-06-21T22:49:00-04:00"
  - task: P05-T02
    decision: "runtime-eve is the certified external runtime driver candidate, with a public-contract adapter package, a pinned Eve transport boundary, subagent/sandbox/eval helpers, and synchronized selector precedence."
    reason: "P05-T02 had to validate the public ADR-004 runtime contract against Eve's public surface, prove fallback behavior, and keep the core selector aligned with the certified default. The adapter is isolated in packages/runtime-eve and the core selector/test expectations are updated to the new certified default."
    decided_at: "2026-06-22T03:24:50Z"
  - task: P05-T03
    decision: "The default RuntimeDriver selector now resolves runtime-eve -> runtime-local -> runtime-legacy-cli, while explicit requested-driver policy fails closed when the requested driver is unavailable."
    reason: "Phase 5's durable operational kernel cut line requires Eve to be the preferred runtime when available, deterministic runtime-local to remain the local/test fallback, and the legacy CLI compatibility path to be explicit rather than implicit. Refusing silent downgrade on forced drivers keeps rollback and degraded-mode decisions audit-visible."
    decided_at: "2026-06-22T03:25:30Z"
  - task: P05-T03
    decision: "runtime-legacy-cli is retained only as a reduced-guarantee transitional driver that still satisfies the seven-method RuntimeDriver surface."
    reason: "Legacy command compatibility remains useful during migration, but it does not provide the same checkpoint, terminal stream, or artifact preservation guarantees as Eve/local. Keeping those guarantees documented and test-visible prevents Phase 6+ from treating the fallback as a durable runtime equivalent."
    decided_at: "2026-06-22T03:26:00Z"
  - task: P05-T04
    decision: "Close Phase 5 with consolidated P05-CLOSEOUT evidence, independent GPT-5.5 review, finalized ledger/index, and a Phase 6 baseline-specification/oracle-pipeline handoff."
    reason: "P05-T01 through P05-T03 collectively establish the Durable Operational Kernel cut line: provider-neutral runtime contract, deterministic local runtime, certified Eve adapter, fallback selector, legacy compatibility fallback, import-boundary guard, and full validate-next verification. Phase 6 can now build baseline/oracle artifacts against this runtime surface."
    decided_at: "2026-06-22T03:34:55Z"
