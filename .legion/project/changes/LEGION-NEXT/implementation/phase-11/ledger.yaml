decisions:
  - task: P11-T01
    decision: "Dashboard projection lives in @legion/board (not @legion/core) and reads the append-only board event log; SQLite-backed projection in @legion/store-sqlite mirrors the P09-T02 / P10-T01 projector pattern."
    reason: "Mirrors the established layering: core owns provider-neutral orchestration, board owns logical aggregation/reduction, store-sqlite owns SQLite persistence. The dashboard is a read projection across task.*, change.*, release.*, and approval.* board events — no new orchestration is introduced."
    decided_at: "2026-06-22T11:30:00Z"
  - task: P11-T01
    decision: "Dashboard projection is project-scoped and content-addressed by `dashboard:<projectId>`. It exposes task status counts, aggregate-kind counts, a bounded event timeline, release-observation verdict pointers, and approval verdict pointers."
    reason: "Operators need a deterministic project read model over the event log without introducing a separate dashboard app/package. Project scoping keeps multi-project boards collision-free."
    decided_at: "2026-06-22T11:35:00Z"
  - task: P11-T01
    decision: "Approval-gate workflow lives in @legion/board as a pure reducer and projection key `approval-gate:<projectId>:<changeId>`, consuming whole-change and release-observation events into a fail-closed `approved | rejected | blocked | pending` verdict."
    reason: "The Phase 10 handoff required approval workflow as a first-class operator concept while preserving deterministic replay from the audit log."
    decided_at: "2026-06-22T11:40:00Z"
  - task: P11-T01
    decision: "Dashboard and approval-gate reducers are foreign-event-safe: mismatching aggregate kind, aggregate id, project id, change id, or malformed payloads are ignored silently."
    reason: "The board event log is interleaved across tasks, changes, releases, approvals, and projects; projections must replay global logs without throwing on unrelated events."
    decided_at: "2026-06-22T11:45:00Z"
  - task: P11-T01
    decision: "The CLI operator surface for P11-T01 is `legion next board dashboard {status|rebuild|verify}` and `legion next board approval-gate {status|rebuild|verify}`, routed through `SqliteBoardStoreWithEventRepository`."
    reason: "Mirrors P10-T02 release-observation CLI wiring: CLI commands surface/rebuild/verify derived read state and do not mutate frozen whole-change or release-observation state."
    decided_at: "2026-06-22T11:50:00Z"
  - task: P11-T01
    decision: "Provider-neutral boundaries: dashboard and approval-gate source in @legion/board never imports a runtime driver, Eve, board persistence, node:sqlite, or reads process.env; SQLite projectors stay in @legion/store-sqlite."
    reason: "Preserves the Phase 8/9/10 package-boundary model while adding operator projections."
    decided_at: "2026-06-22T11:55:00Z"
  - task: P11-T02
    decision: "Portfolio projection lives in @legion/board and reads the append-only board event log; SQLite-backed projection in @legion/store-sqlite mirrors the P11-T01 dashboard / P09-T02 whole-change / P10-T01 release-observation projector pattern."
    reason: "Portfolio state is a logical cross-project read model over board events, not core orchestration."
    decided_at: "2026-06-22T12:00:00Z"
  - task: P11-T02
    decision: "Portfolio projection is tenant-scoped: one projection key per tenantId (`portfolio:<tenantId>`), with optional projectIds scope included in the content-addressed projection hash inputs."
    reason: "Tenant scoping and scope hashing let multi-tenant/multi-project boards host tenant-wide and sub-portfolio views without collisions."
    decided_at: "2026-06-22T12:05:00Z"
  - task: P11-T02
    decision: "Per-project rollup is content-addressed and includes task status counts, aggregate-kind counts, task/terminal/active/blocked counts, priority bands, claim utilization, last event metadata, last release-observation status, and last approval verdict."
    reason: "The portfolio surface must answer operator questions about multi-project load, readiness, blocking pressure, and release/approval status without scanning every project dashboard."
    decided_at: "2026-06-22T12:10:00Z"
  - task: P11-T02
    decision: "Cross-project dependency edges with relation `depends_on` or `blocks` are surfaced only when fromProjectId and toProjectId differ; same-project edges stay out of the public portfolio dependency array."
    reason: "Within-project edges are covered by project-level board/dashboard views. The portfolio adds the cross-project operator surface."
    decided_at: "2026-06-22T12:15:00Z"
  - task: P11-T02
    decision: "Portfolio reducer accepts a priorEvents hint, mirroring the dashboard reducer, so incremental callers can reconstruct private live task state without leaking it into the public projection shape."
    reason: "Incremental tests/projector flows and full-log replays must produce identical content-addressed public state."
    decided_at: "2026-06-22T12:20:00Z"
  - task: P11-T02
    decision: "The CLI operator surface for P11-T02 is `legion next board portfolio {status|rebuild|verify}`; tenantId is required and projectIds optionally scopes the portfolio."
    reason: "Mirrors the dashboard and release-observation status/rebuild/verify pattern while keeping the surface JSON-oriented for an eventual external UI."
    decided_at: "2026-06-22T12:25:00Z"
  - task: P11-T02
    decision: "Provider-neutral boundaries: portfolio source in @legion/board never imports a runtime driver, Eve, board-store beyond types, node:sqlite, or reads process.env; SQLite portfolio persistence stays in @legion/store-sqlite."
    reason: "Preserves the established board/store-sqlite layering for projection adapters."
    decided_at: "2026-06-22T12:30:00Z"
  - task: P11-T03
    decision: "Close Phase 11 as the Operator/UI Beta cut line."
    reason: "P11-T01 and P11-T02 together establish project dashboards, approval-gate verdicts, tenant-scoped portfolio rollups, cross-project dependency edges, resource allocation ledgers, SQLite replay/rebuild/verify adapters, and JSON CLI operator commands ready for Phase 12 host bridges."
