decisions:
  - task: P11-T01
    decision: "Dashboard projection lives in @legion/board (not @legion/core) and reads the append-only board event log; SQLite-backed projection in @legion/store-sqlite mirrors the P09-T02 / P10-T01 projector pattern."
    reason: "Mirrors the established layering: core owns provider-neutral orchestration, board owns logical aggregation/reduction, store-sqlite owns SQLite persistence. The dashboard is a *read* projection across the existing board event log (task.*, change.*, release.*, approval.*) — no new orchestration is introduced."
    decided_at: "2026-06-22T11:30:00Z"
  - task: P11-T01
    decision: "Dashboard projection is global (one projection key per project) and content-addressed by `dashboard:<projectId>`. It exposes task status counts by `BoardTaskStatus`, a rolling event timeline (last N events), the most recent release-observation verdict, and the most recent approval verdict."
    reason: "Mirrors the Phase 10 P10-T01 contract inputs (`release-observation:<changeId>:<mergeQueueHash>` projection handle) and adds the missing operator surfaces the kanban manifest promised after Phase 11: status aggregation, event timeline, and approval workflow. Scoping the projection by `projectId` keeps the dashboard read-side deterministic across multi-project boards."
    decided_at: "2026-06-22T11:35:00Z"
  - task: P11-T01
    decision: "Approval-gate workflow lives in @legion/board as a typed pure decision function (and a corresponding projection key `approval-gate:<projectId>:<changeId>`) that consumes the change.*, release.*, and approval.* board events for a given change and emits a fail-closed `ApprovalGateVerdict` (`approved` / `rejected` / `pending` / `blocked`)."
    reason: "The Phase 10 handoff calls out that the dashboard/operator surface must surface 'approval workflow' as a first-class concept. The approval-gate keeps the decision deterministic and replayable through the existing board event log so a green dashboard state is always derivable from the same audit trail."
    decided_at: "2026-06-22T11:40:00Z"
  - task: P11-T01
    decision: "Dashboard and approval-gate reducers are foreign-event-safe: events with mismatching `aggregateKind`, `aggregateId`, or `eventType` are ignored silently (mirrors P09-T02 / P10-T01)."
    reason: "Interleaved board event logs are the canonical replay surface. The reducer must not throw on foreign events because the global event log carries task.*, task_link.*, claim.*, approval.*, change.*, and release.* events in any order."
    decided_at: "2026-06-22T11:45:00Z"
  - task: P11-T01
    decision: "The CLI operator surface for P11-T01 is `legion next board dashboard {status|rebuild|verify}` and `legion next board approval-gate status`. All five subcommands route through `SqliteBoardStoreWithEventRepository` so the SQLite handle is opened/closed atomically."
    reason: "Mirrors the P10-T02 CLI wiring. The CLI does NOT mutate frozen whole-change or release-observation state; it only replays, rebuilds, and verifies the new dashboard/approval-gate projections."
    decided_at: "2026-06-22T11:50:00Z"
  - task: P11-T01
    decision: "Provider-neutral boundaries: dashboard + approval-gate source in @legion/board never imports a runtime driver, eve, board-store (only types), or reads process.env. The SQLite projectors never import a runtime driver, eve, or read process.env."
    reason: "Mirrors the Phase 8 / 9 / 10 boundary scans. The dashboard and approval-gate modules are the canonical producers of operator-facing read-state; only the SQLite adapter layer touches persistence."
    decided_at: "2026-06-22T11:55:00Z"
  - task: P11-T02
    decision: "Portfolio projection lives in @legion/board (not @legion/core) and reads the append-only board event log; SQLite-backed projection in @legion/store-sqlite mirrors the P11-T01 dashboard / P09-T02 whole-change / P10-T01 release-observation projector pattern."
    reason: "Mirrors the established layering: core stays provider-neutral (no event log reads); board owns the logical aggregation/reduction over board events. The portfolio is a *cross-project* projection that derives read-only state from the same audit trail."
    decided_at: "2026-06-22T11:30:00Z"
  - task: P11-T02
    decision: "Portfolio projection is tenant-scoped: one projection key per tenantId (`portfolio:<tenantId>`), content-addressed. The optional `projectIds` scope filter is included in the projection hash inputs so a sub-portfolio and the tenant-wide portfolio content-address distinctly."
    reason: "Mirrors the P11-T01 dashboard (per-projectId) and P09-T02 (per changeId) projection key shapes. Tenant scoping lets a multi-tenant board host multiple portfolio projections in parallel without collisions."
    decided_at: "2026-06-22T11:35:00Z"
  - task: P11-T02
    decision: "Per-project rollup is content-addressed and includes: task status counts, aggregate kind counts, task count, terminal task count, active task count, blocked task count, total priority, max priority, per-band priority counts (high/mid/low), claimed task count, last event type, last global sequence, last occurredAt, last release-observation status, last approval verdict."
    reason: "Per-project rollup is the canonical per-(tenant, project) view; the cross-project portfolio surface composes the rollups without leaking private caches into the public shape."
    decided_at: "2026-06-22T11:40:00Z"
  - task: P11-T02
    decision: "Cross-project dependency edges (relation = `depends_on` or `blocks`) with non-equal from/to projectId are surfaced in the public `dependencyEdges` array; same-project edges are silently dropped from the array so the public surface stays cross-project-only."
    reason: "Within-project edges are already covered by the P11-T01 dashboard; the portfolio adds the cross-project surface as a first-class concept so a multi-project board operator can answer 'which projects depend on which other projects' without scanning per-project rollups."
    decided_at: "2026-06-22T11:45:00Z"
  - task: P11-T02
    decision: "Reducer accepts an optional `priorEvents` hint (mirroring the P11-T01 dashboard `ReduceDashboardOptions.priorEvents`) so incremental callers (tests, projection rebuild helpers) can reconstruct the per-task live state from a caller-supplied event slice without re-applying events to the already-populated rollups."
    reason: "Mirrors the P11-T01 dashboard reducer shape; lets the SQLite projector and test fixtures reuse the same reducer without leaking transient state into the public projection shape."
    decided_at: "2026-06-22T11:50:00Z"
  - task: P11-T02
    decision: "The CLI operator surface for P11-T02 is `legion next board portfolio {status|rebuild|verify}`. All three subcommands require a `tenantId` field; the optional `projectIds` list scopes the reducer to a specific set of projects."
    reason: "Mirrors the P11-T01 dashboard CLI surface. The CLI does NOT mutate frozen dashboard, whole-change, release-observation, or approval-gate state; it only replays, rebuilds, and verifies the new portfolio projection."
    decided_at: "2026-06-22T11:55:00Z"
  - task: P11-T02
    decision: "Provider-neutral boundaries: portfolio source in @legion/board never imports a runtime driver, eve, board-store (only types), or reads process.env. The SQLite portfolio projector never imports a runtime driver, eve, or reads process.env."
    reason: "Mirrors the Phase 8 / 9 / 10 / 11-T01 boundary scans. The portfolio module is the canonical producer of operator-facing cross-project read-state; only the SQLite adapter layer touches persistence."
    decided_at: "2026-06-22T12:00:00Z"
blockers: []
preserved_boundaries:
  - "Phase 10 package boundaries remain fixed: core owns release-observation orchestration, board owns logical aggregation/reduction for whole-change + release-observation + dashboard + approval-gate + portfolio, store-sqlite owns SQLite projection persistence. Phase 11 extends board with three new projection families (dashboard + approval-gate + portfolio) and adds three new SQLite adapters."
  - "Dashboard, approval-gate, and portfolio projections never mutate frozen whole-change or release-observation state; they derive read-only aggregates from the same append-only event log."
  - "Provider-specific command execution (canary probes, host monitoring) stays outside @legion/core and @legion/board; the CLI surface is status/rebuild/verify only."
  - "Phase 8 per-task, Phase 9 whole-change, Phase 10 release-observation, and Phase 11 dashboard + approval-gate + portfolio hashes are preserved so dashboard anomalies, approval-gate decisions, and portfolio rollups can be traced back to exact task, change, and release evidence."
