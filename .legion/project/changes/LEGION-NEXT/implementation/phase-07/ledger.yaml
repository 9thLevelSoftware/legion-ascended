decisions:
  - task: P07-T01
    decision: "TaskContract now carries explicit wave and agent assignment fields, with schema validation for wave identifiers and unique agent IDs."
    reason: "Phase 7 planner outputs need to be decomposable into reviewable execution waves and bind work to concrete worker resources before dispatch. Encoding wave and agents in the protocol contract keeps that plan visible to schema validation, generated JSON Schema, lifecycle fixtures, and artifact/taskgraph consumers."
    decided_at: "2026-06-22T04:48:27Z"
  - task: P07-T01
    decision: "Lifecycle fixtures and downstream artifact tests were regenerated/updated to use the new TaskContract shape."
    reason: "TaskContract is embedded in protocol lifecycle fixtures and artifact/taskgraph proof tests. Updating those consumers at the same cut line prevents stale fixtures from masking contract drift."
    decided_at: "2026-06-22T04:48:27Z"
  - task: P07-T02
    decision: "preflightTaskContract is the protocol-level pre-execution validator for dependency satisfaction, agent/resource availability, predecessor artifact availability, and contract completeness."
    reason: "Planner contracts must fail closed before a worker is spawned when upstream contracts/artifacts are unavailable, assigned agents cannot run, or the contract lacks source context or expected completion artifacts. A typed preflight result gives downstream dispatch and review logic structured issue codes instead of prose-only blockers."
    decided_at: "2026-06-22T05:00:27Z"
  - task: P07-T03
    decision: "Close Phase 7 with consolidated P07-CLOSEOUT evidence, independent review, finalized ledger/index, and a Phase 8 fresh-context execution handoff."
    reason: "P07-T01 and P07-T02 establish the Planner Task Contracts and Preflight cut line: protocol-visible wave decomposition, agent assignment, generated schema/fixture updates, and fail-closed preflight checks. Phase 8 can now wire fresh worker contexts against this task-contract boundary."
    decided_at: "2026-06-22T05:09:20Z"
