decisions:
  - task: P06-T01
    decision: "The canonical baseline corpus is now anchored by evals/baseline/manifest.yaml and evals/baseline/schema/manifest.schema.json, with evals/baseline/corpus-manifest.yaml retained as an alias pointer rather than a second source of truth."
    reason: "Phase 6 requires baseline governance to be reviewable, versioned, and hashable before planner/preflight work consumes benchmark scenarios. A single manifest prevents scenario metadata, hidden oracle paths, and fixture-hash policy from diverging."
    decided_at: "2026-06-21T23:57:32Z"
  - task: P06-T01
    decision: "Held-out oracle assertions are declared through evals/baseline/schema/oracle-assertions.schema.json and evals/fixtures/evaluator/*/assertions.yaml; worker-visible packets must keep visible_to_worker false."
    reason: "The benchmark only measures real solution quality if evaluator-only material remains sealed until deterministic grading. The schema/test coverage makes hidden-oracle leakage a validation failure instead of a convention."
    decided_at: "2026-06-21T23:58:12Z"
  - task: P06-T01
    decision: "Fixture hashes are canonicalized as lowercase SHA-256 digests over LF-normalized UTF-8 text with POSIX-relative paths, and tests verify every listed digest against the current fixture bytes."
    reason: "Phase 6 baseline evidence has to survive Windows/macOS/Linux checkout drift and keep fixture mutations explicit. Lowercase POSIX LF hashes match the repository's cross-platform evidence model."
    decided_at: "2026-06-21T23:59:04Z"
  - task: P06-T02
    decision: "Existing @legion/artifacts oracle, taskgraph, and evidence-index services satisfy the Phase 6 oracle-pipeline acceptance criteria; P06-T02 records fresh proof and package/validate logs without adding source changes."
    reason: "The services already enforce revisioned oracle artifacts, taskgraph input binding, manifest-hash revalidation, evidence-index provenance, and durable accepted-evidence references. Capturing proof against the existing service avoids churn while preserving review evidence."
    decided_at: "2026-06-22T00:07:44Z"
  - task: P06-T03
    decision: "Close Phase 6 with consolidated P06-CLOSEOUT evidence, independent review, finalized ledger/index, and a Phase 7 planner-task-contract handoff."
    reason: "P06-T01 and P06-T02 establish the Baseline Specification and Oracle Pipeline cut line: sealed baseline corpus metadata, hidden oracle governance, canonical fixture hashes, and provenance-aware artifact/evidence services. Phase 7 can now define planner contracts and preflight checks against these stable inputs."
    decided_at: "2026-06-22T04:20:48Z"
