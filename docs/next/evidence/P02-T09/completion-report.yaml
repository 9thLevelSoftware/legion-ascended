notes:
  - The migration API reports native Codex prompt/bridge surfaces but leaves them untouched.
  - Partial installs without `.legion/manifest.json` are treated as user-authored or customized legacy data.
  - Existing `.legion/legacy-protocol/` files must byte-match staged files before apply resumes; mismatches remain conflicts.
  - Backup roots must sit outside the repository tree; rollback manifests remain absolute for cwd-independent recovery.
  - Rollback now also binds backup manifests to their original repository root and verifies backup bytes against the recorded pre-migration hash before restoring.
