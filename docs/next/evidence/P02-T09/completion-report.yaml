summary:
  - Added a Codex `.legion/` migration bridge that inventories legacy protocol files, stages deterministic dry-run reports, applies only after review, backs up the pre-migration tree, and rolls back exact bytes.
  - Preserved current v8 installer behavior while documenting the migration path to `.legion/legacy-protocol/`.
  - Updated v9 project initialization to accept `.legion/legacy-protocol/` as a migrated legacy namespace without allowing arbitrary visible `.legion/` collisions.
  - Hardened rollback backups so backup manifests record absolute paths and rollback validates the backup directory before deleting current `.legion` bytes.
  - Hardened apply recovery so interrupted legacy-protocol moves can be resumed when staged bytes already match, and empty legacy roots are removed so v9 initialization is unblocked.
  - Moved legacy `.legion/migration/` files consistently with other protocol roots and rejected backup roots that overlap `.legion/` before any backup copy can mutate source bytes.
  - Rejected symlinked legacy entries, tampered dry-run move lists, cross-repository rollback manifests, and corrupted backups before apply or rollback can delete `.legion` bytes.
