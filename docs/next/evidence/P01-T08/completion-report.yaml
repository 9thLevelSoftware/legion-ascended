status: DONE
phase: 1
task: P01-T08
summary: >
  Implemented pure risk classification and gate derivation for ADR-006 in packages/core.
  The classifier normalizes structured workflow risk signals, derives tiers from score
  thresholds plus hard floors, produces deterministic explanations and protocol-compatible
  risk profiles, supports approved policy data evolution, and rejects unauthorized tier
  downgrades. Gate derivation is isolated as policy data and remains provider-neutral.
  Review follow-up hardened malformed JavaScript/custom-policy inputs, enforced retained
  gates from lower-tier overrides, and kept returned risk-profile reasons within protocol
  limits.
