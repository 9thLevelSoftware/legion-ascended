decisions:
  - task: P08-T02
    decision: "Per-task review pipeline lives in @legion/core (not @legion/protocol)
      because the pipeline orchestrates protocol-level contracts AND
      core-level dispatcher outputs (WorkerContext)."
    reason: "Mirrors the P08-T01 placement rule: dispatch = core-internal,
      WorkerContext = core-internal execution surface; review consumes
      both and produces an AcceptanceDecision that lives next to its inputs."
  - task: P08-T02
    decision: "Reviewer surface enforces hard independence: same-actor
      reviews are flagged `independent: false` on the ReviewRecord and
      surface a `reviewer_is_implementer` issue."
    reason: "ADR-006 mandates independent review at R1+. A worker cannot
      review its own work. The pipeline records the attempted review
      so audit consumers can see the rejection without losing context."
  - task: P08-T02
    decision: "Per-task loop emits `escalated` (not `rejected`) for R3
      because R3 requires explicit human approval which is out of scope
      for the loop."
    reason: "The orchestrator uses `escalated` to route R3 tasks to a
      human owner; the per-task loop records the gate as
      `not_evaluable` so the operator can see why."
  - task: P08-T02
    decision: "Deterministic verification runner is injected; the
      pipeline never spawns a child process."
    reason: "Provider neutrality (ADR-004): the CLI adapter and runtime
      driver supply the actual command execution; core owns the
      deterministic record shape."
  - task: P08-T02
    decision: "Acceptance decision outcome is one of three values:
      `accepted`, `rejected`, `escalated`."
    reason: "Three-valued outcome preserves the difference between
      \"gate failed ⇒ task must redo\" and \"gate requires human ⇒ task
      must escalate\" without conflating them."
