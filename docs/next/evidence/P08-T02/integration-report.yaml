implementation_summary: |
  P08-T02 ships the per-task review pipeline in @legion/core:

  - review/contract.ts — typed pipeline surface (REVIEW_PIPELINE_KEYS allowlist,
    ReviewPipelineIssue codes, PerTaskReviewPolicy + DEFAULT_REVIEW_GATE_POLICY,
    ReviewGateId union, ReviewerVerdicts, AcceptanceDecision outcome).
  - review/hash.ts — deterministic SHA-256 derivation for verification
    reports, review records, acceptance decisions, and the top-level
    pipeline hash. Same canonicalization rules as dispatch/hash.ts so
    P08-T01/P08-T02 outputs are greppable across the evidence index.
  - review/verification.ts — deterministic verification runner.
    Walks TaskContract.verification[] in order, delegates each command
    to an injected VerificationRunner, captures exit code / stdout /
    stderr / duration / timeout, computes a deterministic
    VerificationReport with `passed` + `failingIndices` + `reportSha256`.
  - review/reviewer.ts — independent reviewer surface. Enforces
    reviewer ≠ implementer, blocks blocking findings without evidence
    refs, surfaces `review_verdict_inconsistent` when verdicts pass but
    blocking findings exist, derives a default summary from findings.
    Returns a frozen ReviewRecord with `independent` flag.
  - review/gate.ts — ADR-006 acceptance gate evaluator. Maps the
    contract's risk tier to the per-task-review gate set
    (R0: none; R1: deterministic_verification +
    lightweight_independent_review + evidence_bundle_or_log;
    R2: + task_level_independent_review + task_contract;
    R3: + escalation to explicit_human_approval). Emits a typed
    AcceptanceDecision with outcome `accepted` / `rejected` /
    `escalated`.
  - review/pipeline.ts — orchestrator. Wires verification →
    review → acceptance gate; derives the top-level reviewPipelineHash;
    surfaces structured issues from each stage; deeply freezes every
    output shape.
  - review/index.ts + packages/core/src/index.ts — barrel re-exports.

  33 unit tests pin the Phase 8 cut line: happy paths, all
  failure modes, R0-R3 tier handling, deterministic verification,
  reviewer independence, evidence anchoring, provider-neutrality
  static scan, output shape allowlist, deep-freeze invariants,
  hash determinism, and renderer stability.

