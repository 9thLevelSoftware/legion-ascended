status: DONE
phase: 2
task: P02-T03
summary: >
  Implemented the current-spec repository service for capability-scoped,
  Git-diffable current truth under `.legion/project/specs/<requirement-id>.md`.
  The service renders and parses JSON-frontmatter Markdown specs, validates
  protocol requirements, stable anchors, required sections, unresolved
  placeholders, contradictory status, orphan trace IDs, duplicate requirement
  IDs across specs, and stale revision updates. It also derives a deterministic
  in-memory spec index, computes semantic diffs, supports read/list/create/update
  plus rename/deprecate operations, and publishes the generated spec-document
  JSON Schema.
