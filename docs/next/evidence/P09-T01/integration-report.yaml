acceptance:
  ordered_merge_queue:
    status: PASS
    evidence:
      - packages/core/src/merge/contract.ts
      - packages/core/src/merge/orchestrator.ts
      - packages/core/src/merge/rebase.ts
      - packages/core/test/merge.test.mjs
      - docs/next/evidence/P09-T01/merge-queue-snapshot.json
    notes:
      - "MergeQueueOrchestrator accepts an ordered set of accepted task runs and produces a frozen snapshot plus a whole-change MergeIntegrationDecision."
      - "Sequencer walks one entry at a time, refuses to advance past a conflict / rejected / escalated step, and propagates a `previousOutcome` flag so later entries do not falsely report `entry_base_ref_mismatch` when the head ref has not moved."
      - "The orchestrator result exposes only the `MERGE_QUEUE_KEYS` allowlist; every output is deeply frozen."
  conflict_detection:
    status: PASS
    evidence:
      - packages/core/src/merge/conflict.ts
      - packages/core/test/merge.test.mjs
    notes:
      - "Path-level conflict detector normalizes POSIX paths (handles `.`, `..`, trailing slashes) and reports `overlapping_write` and `sequential_violation` reports with stable sorted indices."
      - "An externally supplied PathOwnershipMap is honored alongside contract-declared write/sequential scopes, so CLI adapters can layer in filesystem-discovered claims (e.g. `git ls-tree`)."
      - "Conflict pairs are deduped by `(path, reason)` so the same pair across multiple overlapping scopes collapses into a single ConflictReport."
  rebase_sequencer:
    status: PASS
    evidence:
      - packages/core/src/merge/rebase.ts
      - packages/core/test/merge.test.mjs
    notes:
      - "Rebase execution is injected as a `RebaseRunner` callback so the merge queue stays provider-neutral (no git, no Eve, no board persistence)."
      - "A failing runner surfaces `rebase_command_failed`; an empty `newHeadRef` surfaces `rebase_head_drift`; both gate the step to `conflict`."
      - "Without a runner, every step is `queued` and the whole-change decision is `blocked`."
  whole_change_integration_gate:
    status: PASS
    evidence:
      - packages/core/src/merge/gate.ts
      - packages/core/test/merge.test.mjs
    notes:
      - "Fail-closed aggregation: any `rejected` or `conflict` step forces whole-change `rejected`; any `escalated` step forces whole-change `escalated`; any `queued` step forces `blocked`; otherwise `integrated`."
      - "Decision carries the snapshot's `mergeQueueHash`, a deterministic `decisionSha256`, and a human-readable `rationale` so audit consumers can grep for the failing entry set."
  phase_boundaries:
    status: PASS
    evidence:
      - packages/core/test/merge.test.mjs
    notes:
