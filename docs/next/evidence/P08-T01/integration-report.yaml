    - "Phase 5 RuntimeDriver neutrality still applies: dispatcher does not import a runtime driver, board persistence, or process environment. RuntimeDriver implementation is selected downstream by the consumer of WorkerContext."
    - "Phase 4 worker bundle prompt-content contract: WorkerContext.workerBundle.promptContentContract is the field downstream prompt-rendering code MUST consult."
