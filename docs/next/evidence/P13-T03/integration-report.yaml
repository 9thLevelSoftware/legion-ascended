task: P13-T03
phase: 13
phase_id: P13
status: DONE
base_commit: "e1c66cccfcf73be0f1e45b79b75272ce2da92822"
implementation_branch: "codex/p03-t02-board-task-repository"
summary: |
  Built the GA cut-over package on top of the P13-T01 behavioral-eval
  surface and the P13-T02 security hardening. The release checklist
  (`scripts/release/release-checklist.mjs`) composes ten fail-closed
  preconditions into a single JSON verdict (status: ready/blocked)
  wired as `legion next release checklist`. The rollback-policy
  verifier (`scripts/release/rollback-policy.mjs`) re-hashes the
  backup directory produced by `legion next migrate --apply` and
  fails closed on schema drift, hash mismatch, missing backup,
  repositoryRoot mismatch, source-kind mismatch, and manifests
  older than 365 days; wired as `legion next release rollback-verify`.
  Authored the four companion GA documents under `docs/next/ga/`
  (MIGRATION-POLICY, ROLLBACK-POLICY, V8-HANDOFF,
  STABLE-CHANNEL-APPROVAL) plus the consolidated RELEASE-RECORD.md
  that cross-links them. Pinned the held-out fail-closed contract
  with 28 new root tests (13 rollback-policy + 15 release-checklist)
  and 6 CLI e2e tests for the new release subcommands. The release
  checklist reports `status: ready` (zero findings) against the
  canonical v9 GA evidence; the rollback verifier reports
  `status: restorable` against a synthetic well-formed codex
  backup-manifest. v8 evidence remains fail-closed (null cells in
  the A/B comparison) and the GA promotion is approved without v8
  baseline execution because P00-T06 v8 baseline remains blocked
  (recorded in RELEASE-RECORD.md outstanding-items list).
deliverables:
  - path: scripts/release/release-checklist.mjs
    description: |
      Fail-closed GA gate that verifies ten preconditions for the v9
      GA promotion: CHANGELOG entry, every companion document under
      docs/next/ga/, the Phase 13 ledger state (P13-T01 / P13-T02 /
      P13-T03 all DONE), the P13-T02 threat-model verdict, the
      P13-T01 A/B comparison, and the validate-next log. Emits a
      JSON verdict with stable per-check findings. Honours
      `--repository-root` and `--report`. Non-zero exit on any
      fail-closed finding.
  - path: scripts/release/rollback-policy.mjs
    description: |
      Backup-manifest verifier that confirms the most recent apply
      step is restorable. Re-hashes the backup directory using the
      same algorithm as `@legion/legacy-bridge`'s `hashTree`
      (sorted POSIX paths, sha256 `path\0bytes\0`). Rejects schema
      drift, unknown kinds, cross-source mismatches, missing fields,
      repositoryRoot mismatch, missing backup directory, hash drift,
      and manifests older than 365 days. Honours `--repository-root`
      and `--source` for cross-source rejection. Emits a JSON
      verdict with stable per-source findings; informational findings
      (severity: "info") do not block the verdict.
  - path: packages/cli/src/commands/release/index.ts
    description: |
      `legion next release {checklist,rollback-verify}` CLI adapter.
      The CLI parses the JSON verdict regardless of exit code so
      structured findings surface to CI gates. The `runScript` path
      resolver recognises the two new helpers alongside the existing
      capture/grade/compare/threat-model helpers.
  - path: packages/cli/src/index.ts
    description: |
      Root CLI dispatch advertises the new `release` command
      alongside `project`, `change`, `board`, `migrate`, and
      `evals`.
  - path: tests/release-checklist.test.mjs
    description: |
      15 regression tests pinning every fail-closed path: well-formed
      workspace, CHANGELOG missing entry, CHANGELOG missing GA
      keyword, RELEASE-RECORD missing companion link, MIGRATION/ROLLBACK/
      V8-HANDOFF/STABLE-CHANNEL-APPROVAL missing, ledger task not
      DONE, threat-model verdict missing / reporting findings,
      ab-comparison missing, validate-next log missing PASS / PASS
      happy path, and semver validation.
  - path: tests/rollback-policy.test.mjs
    description: |
      13 regression tests pinning every fail-closed path: well-formed
      codex / planning manifests, missing manifest, malformed JSON,
      schemaVersion mismatch, unknown kind, source-kind mismatch,
      missing field, repositoryRoot mismatch, missing backupPath,
      hash drift, manifest age, and well-formed checks map.
  - path: apps/cli-e2e/test/cli-e2e.test.mjs
    description: |
      6 new CLI e2e tests for the release subcommands: checklist
      blocked when GA evidence is missing, per-check breakdown,
      rollback-verify blocked when manifest is missing,
      rollback-verify restorable for a well-formed codex manifest,
      missing --release-version, missing --backup-manifest.
  - path: docs/next/ga/RELEASE-RECORD.md
    description: |
      Consolidated GA decision package pointing at every companion
      document, the fail-closed gates, the implementation evidence,
      the preserved-boundary contract, the outstanding-items list
      (P00-T06 v8 baseline still blocked, 6 pre-existing gitleaks
      findings in P03-T04 evidence + skills/agents docs out of
      scope), and the reviewer sign-off table.
  - path: docs/next/ga/MIGRATION-POLICY.md
    description: |
      Operator-facing v8 → v9 migration policy. Pins the
      `--from-<source>` / `--verify|--dry-run|--apply|--rollback`
      matrix, the source class preservation rules (installer-manifest,
      manifest-native-artifact, prompt-file, bridge-skill,
      user-authored-or-customized), the review gates that block
      destructive apply steps, the init-after-migration rule, the
      verification matrix, and the operator runbook.
  - path: docs/next/ga/ROLLBACK-POLICY.md
    description: |
      Rollback policy and procedure. Pins the backup-manifest
      contract (`schemaVersion: "0.1.0"`, kind in
      `{codex-legion-migration-backup, planning-import-backup}`,
      pre-migration hash, repositoryRoot match), the rollback
      procedure (locate → verify → invoke → confirm parity →
      record), the cross-source rejection rule, and the idempotence
      guarantees.
  - path: docs/next/ga/V8-HANDOFF.md
    description: |
      v8 / v9 coexistence rules. Pins the v8 maintenance branch
      policy (start from baseline tag, label `v8-maintenance`,
      permitted change surface), the deprecation timeline (v9 GA
      → +90d v9.1 → +180d sunset notice → +270d v8 final → +365d
      EOL), the rollback triggers, and the channels layout
      (`v8-maintenance` dist-tag until sunset).
  - path: docs/next/ga/STABLE-CHANNEL-APPROVAL.md
    description: |
      Sign-off gate. Pins the decision owner (`dasbl`) sign-off
      block (template form), the approval routing matrix
      (decision owner / ADR review owner / migration owner /
      security owner / evaluation fixture owner), the post-approval
      actions (ledger recording, npm promotion, evidence sealing),
      and the independent review actor-separation rule.
  - path: .legion/project/changes/LEGION-NEXT/implementation/phase-13/ledger.yaml
    description: |
      Phase 13 ledger. P13-T03 marked DONE with the P13-T03
      decisions (GA gating boundaries, finding-code convention,
      cross-linking rule, v8 evidence fail-closed contract) plus the
      extended evidence list pointing at every P13-T03 deliverable.
      The handoff at the bottom is updated to point at P13-T04
      (closeout / independent review).
  - path: .legion/project/changes/LEGION-NEXT/implementation/phase-13/HANDOFF.md
    description: |
      Phase 13 handoff extended with the P13-T03 delivered-surface
      section (fail-closed GA gates, CLI surface, GA decision
      package, tests) plus the verification evidence (root tests
      143/143, cli-e2e 35/35, per-package tests, typecheck,
      validate-next, release checklist verdict, rollback verifier
      smoke-test). The starting-point section guides P13-T04 to
      the release checklist and rollback verifier as the
      highest-level fail-closed gates for Phase 13 acceptance.
acceptance:
  release_checklist_gate:
    status: PASS
    notes:
      - "scripts/release/release-checklist.mjs exists and runs on macOS without PowerShell."
      - "`legion next release checklist --release-version 9.0.0 --validate-next-log <path>` emits a JSON verdict; status: 'ready' on success, 'blocked' on any failure."
      - "The verdict aggregates findings from changelog / release_record / migration_policy / rollback_policy / v8_handoff / stable_channel_approval / ledger / threat_model_verdict / ab_comparison / validate_next_log into a single JSON document with per-check breakdown."
      - "Sub-helpers (the per-check audit functions) exit non-zero on any fail-closed finding; the CLI parses the JSON regardless so CI gates can surface findings."
      - "Each finding carries a stable `code` so CI gates can grep without parsing free-form text (changelog_missing_ga_entry, manifest_backup_hash_match, threat_model_findings_present, etc.)."
  rollback_policy_gate:
    status: PASS
    notes:
      - "scripts/release/rollback-policy.mjs exists and runs on macOS without PowerShell."
      - "`legion next release rollback-verify --backup-manifest <path> --repository-root <repo> --source <codex-legion|planning>` emits a JSON verdict; status: 'restorable' on success, 'blocked' on any fail-closed finding."
      - "The verdict re-hashes the backup directory using the same algorithm as `@legion/legacy-bridge`'s `hashTree` (sorted POSIX paths, sha256 `path\\0bytes\\0`); drift surfaces as `manifest_backup_hash_match`."
      - "Cross-source rollback is rejected via `manifest_kind_supported` (kind != --source)."
      - "Informational findings (severity: \"info\") are surfaced but do not block the verdict."
  held_out_contract:
    status: PASS
    notes:
      - "tests/evals-baseline.test.mjs (P13-T01 + P13-T02) continues to pin the security-sensitive.v1 contract."
      - "The release checklist does not gate v8 evidence; it gates v9 evidence with full visibility into the absent v8 baseline (RELEASE-RECORD.md outstanding-items list)."
      - "v8 evidence remains fail-closed (null cells in the A/B comparison); the GA promotion is approved with that fact recorded."
  preserved_boundaries:
    status: PASS
    notes:
      - "GA gating lives under scripts/release/ + the @legion/cli release subcommand; @legion/core and @legion/board remain provider-neutral."
      - "Held-out oracle assertions remain in evals/fixtures/evaluator/; the security-sensitive scenario's assertions.yaml is hash-pinned by evals/baseline/fixture-hashes.sha256."
      - "Redaction must keep the transcript inspectable for failure context while masking the configured secret canary, OpenAI-style API keys, bearer tokens, URL credentials, JWT tokens, PEM-encoded private keys, JSON-embedded secrets, and common credential assignments (Phase 13 fail-closed contract)."
      - "v8 evidence remains fail-closed: absent P00-T06 v8 runs surface as null cells rather than fabricated values."
  typecheck_and_gates:
    status: PASS
    notes:
      - "pnpm run typecheck passes across all 10 workspace projects."
      - "node scripts/validate-next.mjs passes (boundaries, worker bundles, runtime scans, schemas, tests, npm/pnpm pack)."
      - "node --test tests/**/*.test.mjs tests/**/*.test.cjs: 143/143 (was 115; +13 P13-T03 rollback-policy + 15 P13-T03 release-checklist)."
      - "pnpm --filter @legion/cli-e2e test: 35/35 (was 29; +6 P13-T03 release CLI tests added)."
      - "pnpm --filter @legion/core test: 245/245; @legion/board 113/113; @legion/protocol 55/55; @legion/store-sqlite 171/171; @legion/artifacts 59/59."
      - "gitleaks-p13-t03-diff: no leaks found across the P13-T03 diff."
  release_checklist_verdict:
    status: PASS
    notes:
      - "node scripts/release/release-checklist.mjs --release-version 9.0.0 --validate-next-log docs/next/evidence/P13-T03/validate-next.log --report docs/next/evidence/P13-T03/release-checklist.json"
      - "Verdict: status: 'ready', zero findings, all 10 checks ok: true."
      - "Per-check breakdown: changelog, release_record, migration_policy, rollback_policy, v8_handoff, stable_channel_approval, ledger, threat_model_verdict, ab_comparison, validate_next_log all green."
  rollback_verifier_verdict:
    status: PASS
    notes:
      - "node scripts/release/rollback-policy.mjs --backup-manifest <synthetic-codex-manifest> --source codex-legion --report docs/next/evidence/P13-T03/rollback-policy.json"
      - "Verdict: status: 'restorable', zero blocking findings (1 informational finding: restore_target_absent, which does not block the verdict)."
      - "Per-check breakdown: manifest ok: true, restore_target ok: true."
