decisions:
  - decision: "Dashboard projection lives in @legion/board (not @legion/core) and reads the append-only board event log; SQLite-backed projection in @legion/store-sqlite mirrors the P09-T02 / P10-T01 projector pattern."
    reason: "Mirrors the established layering: core owns provider-neutral orchestration, board owns logical aggregation/reduction, store-sqlite owns SQLite persistence. The dashboard is a *read* projection across the existing board event log (task.*, change.*, release.*, approval.*) — no new orchestration is introduced."
  - decision: "Dashboard projection is global within a project (one projection key per projectId) and content-addressed by `dashboard:<projectId>`. It exposes task status counts by BoardTaskStatus, a rolling event timeline (last N events), the most recent release-observation verdict per change, and the most recent approval verdict per change."
    reason: "Mirrors the Phase 10 P10-T01 contract inputs and adds the missing operator surfaces the kanban manifest promised after Phase 11: status aggregation, event timeline, and approval workflow. Scoping the projection by projectId keeps the dashboard read-side deterministic across multi-project boards."
  - decision: "Approval-gate workflow lives in @legion/board as a typed pure decision function (and a corresponding projection key `approval-gate:<projectId>:<changeId>`) that consumes the change.*, release.* board events for a given change and emits a fail-closed ApprovalGateVerdict (`approved` / `rejected` / `blocked` / `pending`)."
    reason: "The Phase 10 handoff calls out that the dashboard/operator surface must surface 'approval workflow' as a first-class concept. The approval-gate keeps the decision deterministic and replayable through the existing board event log so a green dashboard state is always derivable from the same audit trail."
  - decision: "Dashboard and approval-gate reducers are foreign-event-safe: events with mismatching aggregateKind, aggregateId, projectId (dashboard) or changeId (approval-gate) are ignored silently."
    reason: "Interleaved board event logs are the canonical replay surface. The reducer must not throw on foreign events because the global event log carries task.*, task_link.*, claim.*, approval.*, change.*, and release.* events in any order across multiple projects."
  - decision: "Dashboard reducer threads priorEvents through reduceDashboard so the per-task live state map can be reconstructed for incremental callers (tests), while replayDashboard drives the same reconstruction internally for production callers (CLI projector)."
    reason: "Per-task status counters require a live state map keyed by taskId. The map is private to the reducer (not part of the public DashboardProjectionState) so it must be reconstructed on every reducer call from the prior event stream. This keeps the public projection state shape immutable and content-addressable while still supporting incremental test assertions."
  - decision: "The CLI operator surface for P11-T01 is `legion next board dashboard {status|rebuild|verify}` and `legion next board approval-gate {status|rebuild|verify}`. All six subcommands route through `SqliteBoardStoreWithEventRepository` so the SQLite handle is opened/closed atomically."
    reason: "Mirrors the P10-T02 CLI wiring. The CLI does NOT mutate frozen whole-change or release-observation state; it only replays, rebuilds, and verifies the new dashboard/approval-gate projections."
  - decision: "Provider-neutral boundaries: dashboard + approval-gate source in @legion/board never imports a runtime driver, eve, board-store (only types), or reads process.env. The SQLite projectors never import a runtime driver, eve, or read process.env."
    reason: "Mirrors the Phase 8 / 9 / 10 boundary scans. The dashboard and approval-gate modules are the canonical producers of operator-facing read-state; only the SQLite adapter layer touches persistence."
preserved_boundaries:
  - "Phase 10 package boundaries remain fixed: core owns release-observation orchestration, board owns logical aggregation/reduction for whole-change + release-observation, store-sqlite owns SQLite projection persistence. Phase 11 extends board with two new projection families (dashboard + approval-gate) and adds two new SQLite adapters."
  - "Dashboard and approval-gate projections never mutate frozen whole-change or release-observation state; they derive read-only aggregates from the same append-only event log."
  - "Provider-specific command execution (canary probes, host monitoring) stays outside @legion/core and @legion/board; the CLI surface is status/rebuild/verify only."
  - "Phase 8 per-task, Phase 9 whole-change, and Phase 10 release-observation hashes are preserved so dashboard anomalies and approval-gate decisions can be traced back to exact task and release evidence."
