preserved_boundaries:
  - "Phase 10 package boundaries remain fixed: core owns release-observation orchestration, board owns logical aggregation/reduction for whole-change + release-observation + dashboard + approval-gate + portfolio, store-sqlite owns SQLite projection persistence. Phase 11 (P11-T02) extends board with the portfolio projection family and adds one new SQLite adapter."
  - "Portfolio projection never mutates frozen dashboard, whole-change, release-observation, or approval-gate state; it derives cross-project counts, dependency edges, and resource ledgers from the append-only log."
  - "Provider-specific command execution (canary probes, host monitoring, reviewer/approval workflows) stays outside @legion/core and @legion/board; the CLI surface is status/rebuild/verify only."
  - "Phase 8 per-task, Phase 9 whole-change, Phase 10 release-observation, and Phase 11 dashboard + approval-gate hashes are preserved so portfolio anomalies can be traced back to exact task, change, and release evidence."
