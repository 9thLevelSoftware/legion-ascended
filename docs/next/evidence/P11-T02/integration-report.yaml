decisions:
  - "Portfolio projection lives in @legion/board (not @legion/core) and reads the append-only board event log; SQLite-backed projection in @legion/store-sqlite mirrors the P11-T01 dashboard / P09-T02 whole-change / P10-T01 release-observation projector pattern."
  - "Portfolio projection is tenant-scoped: one projection key per tenantId (`portfolio:<tenantId>`). Multi-tenant board operators can host multiple portfolio projections in parallel without collisions; the optional `projectIds` scope filter lets a sub-portfolio reduce over a specific subset of projects."
  - "Per-project rollup is content-addressed and includes: task status counts, aggregate kind counts, task count, terminal task count, active task count, blocked task count, total priority, max priority, per-band priority counts (high/mid/low), claimed task count, last event type, last global sequence, last occurredAt, last release-observation status, last approval verdict."
  - "Cross-project dependency edges (relation = `depends_on` or `blocks`) with non-equal from/to projectId are surfaced in the public `dependencyEdges` array; same-project edges are silently dropped so the public array stays cross-project-only and the per-project rollup does not double-count."
  - "Resource allocation ledger exposes per-project priority bands, claim utilization, and blocked pressure; the cross-project aggregate `priorityBands` is derived from the per-project rollup counts so incremental reducers (one event at a time) and full-log replays produce identical state without leaking private caches into the public shape."
  - "Reducer accepts an optional `priorEvents` hint (mirroring the P11-T01 dashboard `ReduceDashboardOptions.priorEvents`) so incremental callers (tests, projection rebuild helpers) can reconstruct the per-task live state from a caller-supplied event slice without re-applying events to the already-populated rollups."
  - "Dashboard and approval-gate reducers remain foreign-event-safe; the portfolio reducer is also foreign-event-safe (events with mismatching aggregateKind / aggregateId / eventType / out-of-scope projectId are ignored silently) so an interleaved multi-tenant board event log replays without throwing."
  - "Provider-neutral boundaries: portfolio source in @legion/board never imports a runtime driver, eve, board-store (only types), or reads process.env. The SQLite projector never imports a runtime driver, eve, or reads process.env."
