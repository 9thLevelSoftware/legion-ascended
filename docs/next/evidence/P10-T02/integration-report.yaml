phase_10_handoff:
  next_task: P10-CLOSEOUT
  next_task_id: null
  summary: "Phase 10-T02 wires the release-observation board events into the CLI so operators can run `legion next board release-observation aggregate|status|rebuild|verify`. The CLI is the operator surface on top of the P10-T01 board adapter; no orchestrator changes were required."
  contract_outputs_from_p10_t02:
    - "`legion next board release-observation aggregate --input <file>` builds a ReleaseObservationBoardAggregator success event and appends it through SqliteBoardEventRepository.appendEvents. Idempotency key matches the canonical <changeId>:<mergeQueueHash>:<reportSha256>:<eventType> shape; re-runs on the same idempotency key return the original event id (no duplicate appends)."
    - "`legion next board release-observation status --input <file>` replays the SqliteReleaseObservationProjector without persisting. Returns the projection state (or null) plus the frozen `stateHash` so operators can diff two release-observation runs."
    - "`legion next board release-observation rebuild --input <file>` replays and persists the projection under `release-observation:<changeId>:<mergeQueueHash>` through SqliteBoardProjectionRepository.saveProjection."
    - "`legion next board release-observation verify --input <file>` loads the persisted projection and replays the event log; surfaces drift as a typed failure shape rather than silently passing."
    - "All four subcommands route through SqliteBoardStoreWithEventRepository so the SQLite database handle + projection handle are opened/closed atomically and the WAL is released before temp directory cleanup."
  package_boundary_invariants_preserved:
    - "@legion/cli never imports eve, node:sqlite, or reads process.env — the new release-observation adapter delegates all persistence to @legion/store-sqlite."
    - "The CLI's allowedWorkspaceImports now explicitly allowlists @legion/board, @legion/board-store, and @legion/core. No reverse imports."
    - "Package-boundary and runtime-import-boundary scans continue to pass after the CLI surface extension."
