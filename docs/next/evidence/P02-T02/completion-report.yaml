summary: >
  Implemented the project initialization and constitution service on top of the
  P02-T01 artifact API. The service initializes `.legion/project/project.json`,
  `.legion/project/constitution.md`, and `.legion/var/`, validates the manifest
  and constitution, supports dry-run/idempotent initialization, rejects unsafe
  legacy `.legion/` collisions, updates the constitution with manifest revision
  checks, and publishes a generated project-manifest JSON Schema.
