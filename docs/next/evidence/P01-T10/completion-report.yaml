summary: >
  Preserved and isolated the v8 legacy installer and package surface inside the
  root package while keeping the v9 workspace packages private. Added an explicit
  package-content compatibility gate, restored the legacy command, skill, agent,
  adapter, installer, settings, and documentation assets, documented the legacy
  boundary, and hardened workspace package boundary checks so new core code cannot
  import legacy prompt assets as domain dependencies. Review follow-up hardened
  installer update/uninstall behavior, non-Claude prompt template references, and
  Kilo skill ownership cleanup while preserving the published path contract.
