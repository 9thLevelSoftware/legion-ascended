findings:
  - "P00-T06 v8 baseline execution remains blocked; the threat-model validator operates on whatever sealed runs the operator produces, so the v8 unblock gate is orthogonal to P13-T02."
  - "The 6 remaining gitleaks findings are pre-existing in P03-T04 evidence and skills/agents docs; the P13-T02 diff contributes 0 new leaks (gitleaks-p13-t02-diff.log)."
  - "Capture auto-grading adds a small in-process execFile call to grade-run.mjs after the run-manifest is written; the cost is well under 100 ms on the noop calibration fixture."
preserved_boundaries:
  - "Threat-model validation lives under scripts/baseline/ + the @legion/cli evals subcommand; @legion/core and @legion/board remain provider-neutral and deterministic."
  - "Held-out oracle assertions remain in evals/fixtures/evaluator/; the security-sensitive scenario's assertions.yaml is hash-pinned by evals/baseline/fixture-hashes.sha256."
  - "Redaction must keep the transcript inspectable for failure context while masking the configured secret canary, OpenAI-style API keys, bearer tokens, URL credentials, JWT tokens, PEM-encoded private keys, JSON-embedded secrets, and common credential assignments."
  - "v8 evidence remains fail-closed: absent P00-T06 v8 runs surface as null cells rather than fabricated values."