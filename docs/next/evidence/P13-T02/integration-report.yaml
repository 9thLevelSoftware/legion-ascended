summary: |
  Built the threat-model validator for the v9 behavioral-eval pipeline.
  The validator composes three fail-closed subprocess-level checks
  (sandbox-guard, retention-audit, in-process redaction scan) and is
  exposed as `legion next evals threat-model`. Extended redact-output.mjs
  to cover URL credentials, JWT tokens, PEM-encoded private keys, JSON
  embedded secrets, and multiline bearer tokens without dropping failure
  context (the held-out assertion `redaction does not hide command
  failures` is honoured). capture-run.mjs now auto-grades so every
  sealed run carries a fresh score.json before the threat-model validator
  reads it. Pinned the security-sensitive.v1 held-out contract with a
  regression test. Documented the threat model in
  docs/next/baseline/SECURITY-MODEL.md. All four P13-T01 sealed v9
  dry-runs plus the new P13-T02 security-sensitive sealed run pass the
  threat-model validator; a tampered run that re-introduces the secret
  canary fails closed.
deliverables:
  - path: scripts/baseline/redact-output.mjs
    description: |
      Extended P13-T01 redaction pipeline with six new detectors
      (URL credentials, JWT tokens, PEM-encoded private keys, multiline
      bearer tokens, JSON-embedded secrets, audited per-detector counts).
      Honors the held-out contract `redaction does not hide command
      failures` by always preserving the surrounding context. Exports
      `REDACTION_PATTERNS`, `redactText`, `redactFile`, `redactAndAudit`.
  - path: scripts/baseline/capture-run.mjs
    description: |
      capture-run.mjs now auto-grades every sealed run so score.json is
      on disk before the threat-model validator inspects the run
      directory. The deterministic dimensions depend only on the
      manifest + artifacts, so grading in process keeps the round-trip
      hermetic.
  - path: scripts/baseline/sandbox-guard.mjs
    description: |
      New fail-closed validator that confirms:
        * run directory is contained in --output-root
        * manifest.baseline_commit is a 40-char hex SHA
        * every manifest artifact resolves inside the run directory
          and contains no `..` segments
        * transcript.raw.log is absent (capture deleted it)
        * transcript.redacted.log does not contain LEGION_SECRET_CANARY_*
      Emits JSON verdict with stable finding codes; exits non-zero on any
      failure. Honours --repository-root for the operator's repo root
      override.
  - path: scripts/baseline/retention-audit.mjs
    description: |
      New fail-closed validator that confirms the evidence retention
      policy:
        RETAINED: run-manifest.json, score.json, transcript.redacted.log,
                  git-before.txt, git-after.txt, fixture-hashes.sha256
        DISCARDED: transcript.raw.log, evals/fixtures/evaluator/**
      Recomputes every fixture-hashes.sha256 digest on disk; fails closed
      on drift. Walks every file under the run directory; fails closed on
      held-out material leak. Honours --repository-root.
  - path: scripts/baseline/threat-model.mjs
    description: |
      Orchestrates the fail-closed checks against a sealed run directory.
      Composes sandbox-guard.mjs + retention-audit.mjs as subprocesses
      plus an in-process redaction scan (canary, bearer, credential
      assignment, context-preservation). Emits a single JSON verdict
      with per-source findings. Honours --repository-root for the
      operator's repo root override.
  - path: packages/cli/src/commands/evals/index.ts
    description: |
      Added `legion next evals threat-model` subcommand. The CLI parses
      the JSON verdict from threat-model.mjs regardless of exit code so
      structured findings surface to CI gates (the legacy generic
      evals_helper_failed diagnostic is suppressed in favour of the
      threat-model verdict). The runScript path resolver recognises the
      new threat-model.mjs alongside the existing capture/grade/compare
      helpers.
  - path: tests/evals-redaction.test.mjs
    description: |
      4 regression tests pinning the redaction contract:
        1. Every detector in REDACTION_PATTERNS fires on a representative
           input and emits a stable placeholder.
        2. redactText() is idempotent on its own output.
        3. Failure context is preserved (held-out contract).
        4. redactAndAudit() writes per-detector counts without leaking
           secret values to the audit JSON.
  - path: tests/evals-sandbox.test.mjs
    description: |
      7 regression tests covering sandbox-guard + retention-audit:
        - sandbox passes a well-formed sealed run
        - sandbox fails closed when run_dir escapes output_root
        - sandbox fails closed when raw_transcript.log survives
        - sandbox fails closed when canary leaks into redacted transcript
        - retention fails closed when held-out material is bundled
        - retention fails closed when fixture-hashes.sha256 is drifted
        - retention passes a well-formed sealed run
  - path: tests/evals-threat-model.test.mjs
    description: |
      3 regression tests covering the threat-model orchestrator:
        - passes a well-formed sealed run
        - fails closed when canary leaks
        - fails closed when raw_transcript.log survives
  - path: tests/evals-baseline.test.mjs
    description: |
      Extended with a 6th test that pins the security-sensitive.v1
      held-out contract. The test asserts the three critical assertions
      (canaries redacted, redaction does not hide failures, no
      credential-like value committed) and the calibration known_bad
      phrase are still sealed in the evaluator material.
  - path: apps/cli-e2e/test/cli-e2e.test.mjs
    description: |
      Added 4 CLI e2e tests for the threat-model subcommand:
        - P13-T02 evals CLI threat-model validates a sealed
          noop-calibration run
        - P13-T02 evals CLI threat-model surfaces violations from tampered
          transcripts
        - P13-T02 evals CLI threat-model rejects a run directory outside
          the output root
        - P13-T02 evals CLI threat-model requires --run-dir and
          --output-root
  - path: docs/next/baseline/SECURITY-MODEL.md
    description: |
      Canonical threat model document enumerating trust boundaries,
      attackers, mitigations, the held-out security-sensitive.v1
      contract, the retention policy (retained vs discarded), and the
      fail-closed verdict surface (every finding code documented with its
      source and meaning).
  - path: docs/next/evidence/P13-T02/
    description: |
      Integration evidence: one sealed v9 dry-run for security-sensitive
      (passes the validator), one tampered-run fixture (fails closed with
      two findings), the threat-model.json verdict for each, full gate
      transcripts (typecheck, validate-next, workspace tests, cli-e2e,
      core/board/protocol/store-sqlite/artifacts tests, gitleaks).
