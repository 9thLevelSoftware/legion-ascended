summary: |
  Built a release-grade behavioral eval workflow that compares v8 and v9
  on sealed Phase 0 scenarios. The Phase 0 PowerShell capture/grade/redact
  scaffolds were ported to Node (capture-run.mjs, grade-run.mjs,
  redact-output.mjs) so the eval pipeline runs on macOS without pwsh, and
  the v8/v9 A/B comparison aggregator (compare-runs.mjs) records cost,
  duration, intervention, recovery, and defect metrics by scenario. The
  new `legion next evals {capture|grade|compare}` subcommand wires these
  scripts through the v9 CLI; four new CLI e2e tests cover the round-trip.
  A root regression test pins the sealed corpus against drift.
deliverables:
  - path: scripts/baseline/capture-run.mjs
    description: |
      Node port of capture-run.ps1. Copies the public fixture into a sealed
      run directory, hashes files with LF-normalized UTF-8 text + POSIX
      relative paths, tokenizes the operator-supplied --command via a small
      POSIX shell parser and invokes it through execFile (no shell
      interpolation), runs the transcript through redact-output.mjs, and
      writes a run-manifest.json that validates against
      evals/baseline/schema/run-manifest.schema.json. Accepts --corpus-root
      so CLI e2e workspaces do not need a corpus checkout.
  - path: scripts/baseline/grade-run.mjs
    description: |
      Computes the seven deterministic rubric dimensions (build_integrity,
      acceptance_behavior, regression_control, scope_discipline,
      recovery_behavior, duplicate_work_control, artifact_traceability)
      from the sealed run-manifest.json + sibling run_ids, and writes
      score.json that validates against evals/baseline/schema/score.schema.json.
      Held-out evaluator assertions and judged dimensions remain out of
      scope here; the rubric marks them not_scored_by_scaffold / judge_not_run
      so a downstream grader can re-score after the deterministic seal.
  - path: scripts/baseline/redact-output.mjs
    description: |
      Node port of redact-output.ps1. Masks LEGION_SECRET_CANARY_*,
      OpenAI-style API keys, bearer tokens, and common credential
      assignments. Exposed as both a CLI (--input / --output) and an
      importable redactFile() helper so the capture script can run it
      without spawning a subprocess.
  - path: scripts/baseline/compare-runs.mjs
    description: |
      A/B aggregator. Reads paired v8/v9 sealed run directories, computes
      aggregate and per-scenario rows for cost/duration/intervention/
      recovery/defects, and emits ab-comparison.json + ab-comparison.md.
      Missing v8 evidence surfaces as null cells (fail-closed) rather
      than being silently invented; token/cost are read from the upstream
      telemetry status field without estimation.
  - path: packages/cli/src/commands/evals/index.ts
    description: |
      `legion next evals` CLI adapter. Routes capture/grade/compare
      through the helper scripts and resolves the v9 source root from the
      compiled CLI location so --repository-root can point at any e2e
      workspace. All subcommands emit JSON-serializable CliResult
      payloads.
  - path: packages/cli/src/index.ts
    description: |
      Root CLI dispatch + help text now advertise the new `evals` command
      alongside project/change/board/migrate.
  - path: apps/cli-e2e/test/cli-e2e.test.mjs
    description: |
      Four new CLI e2e tests covering dry-run capture (transcript redaction
      + manifest shape + fixture hashes), grade (seven dimension values +
      schema validation), compare (fail-closed missing v8 evidence + null
      cells in Markdown), and the usage_error when --dry-run is absent.
  - path: tests/evals-baseline.test.mjs
    description: |
      Root-level regression test that pins the sealed Phase 0 corpus
      against drift. Asserts all eight sealed scenario families are
      present, every scenario JSON lists the seven deterministic checks
      and two judged checks, every held-out evaluator assertion is hidden
      from workers, fixture-hashes.sha256 covers every scenario/manifest/
      fixture, and a sample of digests are recomputable from on-disk bytes.
