findings:
  - "P00-T06 v8 baseline execution remains blocked (no P00-T06 run evidence), so the comparison surfaces v8=null cells rather than fabricated values; this matches the P13-T01 contract that absent, stale, or drifted evidence must not pass as green."
  - "All four v9 sealed dry-run captures score 70/95 (acceptance_behavior is intentionally not_scored_by_scaffold for dry-runs; build_integrity/regression_control/scope_discipline/recovery_behavior/duplicate_work_control/artifact_traceability all credit the harness plumbing)."
  - "Token/cost telemetry is recorded as { status: 'unavailable', value: null, reason: 'host did not expose telemetry' }; the compare aggregator surfaces status values rather than estimating from transcript length."
  - "Holding out v8 evidence lets downstream phases gate GA behind an approved v8 execution path (P00-T06 unblock) without weakening the Phase 13 contract."
preserved_boundaries:
  - "Eval execution stays in scripts/baseline/ + the @legion/cli evals subcommand; @legion/core and @legion/board remain provider-neutral and deterministic."
  - "Held-out oracle assertions remain in evals/fixtures/evaluator/ and are not copied into worker prompts or public task context."
  - "Token/cost values are never inferred from transcript length; only the host-supplied telemetry is recorded."
  - "v8 capture still requires the operator-approved --command flag; --dry-run is the only path that runs without invoking the host CLI."
