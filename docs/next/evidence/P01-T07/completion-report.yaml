summary: >
  Pure lifecycle state machines, transition matrices, typed transition rejections, task command decisions,
  deterministic replay helpers, and tests were added to packages/core without introducing storage, runtime,
  provider, clock, network, or random dependencies. Generated protocol README snapshots were normalized under
  a narrow LF checkout rule because the exact documentation snapshot test failed on Windows CRLF checkouts.
