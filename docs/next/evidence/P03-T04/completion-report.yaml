acceptance:
  - criterion: "Provider-neutral BoardClaimRepository contract in @legion/board-store covering tryClaim/getClaim/getActiveClaimForTask/heartbeat/release/reclaimExpiredLeases with BoardClaimContendedError, BoardClaimGenerationError, and BoardClaimNotFoundError sentinels."
    result: PASS
  - criterion: "SqliteBoardClaimRepository runs every mutation inside BEGIN IMMEDIATE so a tryClaim cannot observe a stale task generation between the existence check and the live-claim probe."
    result: PASS
  - criterion: "tryClaim is atomic: a second concurrent claim on the same (task_id, generation) tuple raises BoardClaimContendedError with the holder's owner_id and lease_token, backed by the idx_board_claims_live_task_generation partial UNIQUE index."
    result: PASS
  - criterion: "tryClaim rejects mismatched or missing task generations with BoardClaimGenerationError carrying actualGeneration (or null when the task is absent)."
    result: PASS
  - criterion: "heartbeat advances leaseExpiresAt and refuses unknown lease tokens with BoardClaimNotFoundError; heartbeating a released claim returns the archived row without mutating it."
    result: PASS
  - criterion: "release is idempotent: a second release with a different reason returns the same archived row, preserving the original released_at and release_reason."
    result: PASS
  - criterion: "reclaimExpiredLeases stamps expired live rows with release_reason='expired' and returns the reclaimed claims; a no-op scan leaves active leases untouched."
    result: PASS
  - criterion: "supersedeTask advances the task generation so a fresh tryClaim on the new generation succeeds while the stale lease remains archived with release_reason='superseded'."
    result: PASS
  - criterion: "BOARD_LEASE_RELEASE_REASONS, BOARD_LEASE_TOKEN_MIN_LENGTH, the BoardClaim, BoardClaimRepository, CreateBoardClaimInput, HeartbeatBoardClaimInput, ReleaseBoardClaimInput, and ReclaimBoardClaimsOptions types are exported from @legion/board, @legion/board-store, and @legion/store-sqlite."
    result: PASS
  - criterion: "board_claims.release_reason CHECK constraint widened to include 'superseded' so the dispatcher can stamp claims whose generation was rotated by supersedeTask."
    result: PASS
