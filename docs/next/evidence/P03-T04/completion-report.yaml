summary: "Delivered the BoardClaimRepository contract and the SQLite-backed SqliteBoardClaimRepository covering atomic tryClaim, heartbeat, idempotent release, expired-lease reclaim, and a generation CAS that detects stale claims when supersedeTask bumps the task generation. Added the new claim types and SqliteBoardStoreWithClaimRepository helper to the @legion/board-store and @legion/store-sqlite surface, re-exported them from @legion/board, widened the board_claims CHECK constraint to include 'superseded' so the dispatcher can stamp claims whose generation was rotated, and shipped 17 focused P03-T04 tests that bring the @legion/store-sqlite suite to 55/55 with full workspace validation green (283/283 tests across 7 packages)."
