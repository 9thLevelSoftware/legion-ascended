risks_or_followups:
  - "P03-T05 (outbox) and P03-T06 (comments) both reuse the same partial UNIQUE pattern over (parent_id, generation) for their own dedupe; P03-T04's leaseToken + released_at IS NULL index is the reference shape."
  - "P03-T07 (approvals) may need to look up the active lease for a task before granting/revoking; the new getActiveClaimForTask helper is the read path to use."
  - "P03-T09 (CLI) and P03-T10 (integration tests) should drive the new repository through real board-task + claim lifecycles; the current 17 focused tests cover the contract, not cross-surface flows."
  - "When node:crypto.randomUUID is replaced with a non-UUID lease-token scheme, BOARD_LEASE_TOKEN_MIN_LENGTH=16 still provides a defensive floor, but consider switching to a typed Brand<string, 'LeaseToken'> wrapper to keep call sites honest."
