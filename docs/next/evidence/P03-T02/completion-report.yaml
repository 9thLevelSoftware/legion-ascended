risks_or_followups:
  - "P03-T03 (event append/projection rebuild) should subscribe to the repository's mutation hooks so board_task_events get appended for every state change; the repository currently mutates board_tasks and board_idempotency_records only."
  - "P03-T04 (claims and leases) needs to interact with board_tasks.generation to detect live vs. reclaimed tasks; the schema already supports this via idx_board_claims_live_task_generation but no claim repository exists yet."
