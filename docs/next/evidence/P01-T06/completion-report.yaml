status: DONE
phase: 1
task: P01-T06
summary: >
  Defined versioned append-only event contracts, provider-neutral command/query API contracts, generated JSON Schema
  artifacts, generated contract documentation snapshots, and compatibility fixtures for the Legion v9 workflow protocol.
  The event catalog models workflow state transitions as immutable facts with aggregate generation, sequence, causality,
  actor, timestamp, payload, and idempotency metadata. The API catalog keeps commands and queries transport-neutral while
  requiring every state-changing command to publish typed success and rejection result contracts. Review follow-up added
  defensive catalog lookup handling plus stricter council and doctor command semantics.
