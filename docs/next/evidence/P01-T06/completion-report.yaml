risks_or_followups:
  - Runtime command handlers, projection rebuilders, and storage-backed replay semantics belong to later core/storage/orchestration phases.
  - JSON Schema snapshots cannot represent Zod super-refinement checks for matching event type to payload or command type to payload; protocol tests exercise those runtime refinements.
  - ADR-007 legacy bridge routing remains a Phase 12 concern; this task defines v9 protocol contracts only.
