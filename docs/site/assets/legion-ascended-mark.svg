<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Legion Ascended mark</title>
  <desc id="desc">A terminal prompt inside a gold and violet ascension ring.</desc>
  <defs>
    <linearGradient id="ring" x1="18" y1="18" x2="104" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7b44c"/>
      <stop offset="0.48" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.53 0 0 0 0 0.36 0 0 0 0 0.96 0 0 0 0.6 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="22" fill="#07080d"/>
  <circle cx="60" cy="60" r="45" fill="none" stroke="url(#ring)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="60" cy="60" r="34" fill="none" stroke="#d7b44c" stroke-opacity="0.32" stroke-width="1"/>
  <path d="M60 17v86M17 60h86" stroke="#d7b44c" stroke-opacity="0.32" stroke-width="1"/>
  <path d="M43 51l-10 9 10 9" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M55 75h30" stroke="#f5f5f5" stroke-width="5" stroke-linecap="round"/>
  <circle cx="60" cy="60" r="7" fill="#d7b44c"/>
</svg>
